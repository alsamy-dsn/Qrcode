<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُولّد ملصقات الباركود و QR</title>
    <link rel="stylesheet" href="style.css">
    <!-- استدعاء مكتبات توليد الأكواد -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <!-- لوحة التحكم -->
    <div class="controls no-print">
        <h2>إعدادات الملصق</h2>
        <input type="text" id="text-input" placeholder="أدخل النص أو الرابط هنا">
        <button onclick="generateLabels()">توليد الملصقات</button>
        <button onclick="window.print()">طباعة</button>
    </div>

    <!-- منطقة الملصقات -->
    <div class="labels-container" id="labels-container">
        <!-- سيتم توليد الملصقات هنا عبر الجافاسكريبت -->
    </div>

    <script src="script.js"></script>
</body>
</html>
